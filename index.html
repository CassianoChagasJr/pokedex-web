<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokedex - Web</title>

    <link rel="stylesheet" href="./src/styles/styles.css" />
    <script defer src="./src/scripts/scripts.js"></script>
  </head>
  <body>
    <header class="header-container">
      <div class="header-title">
        <button type="button" class="btn-home" id="btn-home">
          <h1 class="title-header">Pokedex</h1>
        </button>
      </div>
      <div class="header-input">
        <input
          type="text"
          placeholder="Pesquise um pokemon..."
          class="search-pokemon"
          id="pokemonInput"
        />
      </div>
    </header>
    <main class="main-container">
      <section class="filter-container">
        <section class="filter-title">
          <img src="./src/assets/icons/grid.svg" alt="grid" class="grid-icon" />
          <h4 class="title-filter">Filtros</h4>
        </section>
        <section class="filter-button">
          <button type="button" class="favorite-button">
            <img
              src="./src/assets/icons/heart.svg"
              alt="icone de favorito"
              class="heart-icon"
            />
            Apenas Favoritos
          </button>
        </section>
      </section>
      <section class="pokemon-card-container">
        <section class="pokemon-card-content"></section>
        <section class="page-navigation">
          <div class="previous-btn-container">
            <button type="button" class="previous-btn">
              <img
                src="./src/assets/icons/angle-double-small-left.svg"
                alt="seta para esquerda"
                class="arrow-left"
              />
            </button>
          </div>
          <div class="page-identification-container">Página 1 de N</div>
          <div class="next-btn-container">
            <button type="button" class="next-btn">
              <img
                src="./src/assets/icons/angle-double-small-left.svg"
                alt="seta para direita"
                class="arrow-right"
              />
            </button>
          </div>
        </section>
      </section>
    </main>
    <footer></footer>

    <div id="pokemon-modal" class="modal">
      <div class="modal-content">
        <button id="close-modal" class="close-button">
          <img
            src="./src/assets/icons/circle-x.svg"
            alt="Fechar"
            class="close-img-modal"
          />
        </button>

        <div class="modal-header-main">
          <img src="" alt="" class="pokemon-img-main" id="modal-img" />
          <h2 id="modal-name"></h2>
          <span id="modal-id"></span>
          <div id="modal-types" class="types-container"></div>
        </div>

        <div class="info-section">
          <h3 class="section-title">INFORMAÇÕES</h3>
          <div class="info-grid">
            <div class="info-item">
              <span class="label">Altura</span>
              <span class="value" id="modal-height">0.7 M</span>
            </div>
            <div class="info-item">
              <span class="label">Peso</span>
              <span class="value" id="modal-weight">6.9 Kg</span>
            </div>
          </div>
        </div>

        <div class="info-section">
          <h3 class="section-title">HABILIDADES</h3>
          <div id="modal-abilities" class="abilities-container"></div>
        </div>

        <div class="info-section">
          <h3 class="section-title">ESTATÍSTICAS BASE</h3>
          <div id="modal-stats" class="stats-container"></div>
        </div>
      </div>
    </div>
  </body>
</html>
